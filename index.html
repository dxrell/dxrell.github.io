<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Vianna ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    overflow: hidden;
}

h1 {
    margin-top: 20px;
}

#gameArea {
    position: relative;
    width: 100%;
    height: 65vh;
}

.heart {
    position: absolute;
    font-size: 40px;
    cursor: pointer;
    animation: float 3s infinite ease-in-out;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-25px); }
    100% { transform: translateY(0); }
}

#message {
    font-size: 1.5em;
    margin-top: 10px;
}

#final {
    display: none;
    margin-top: 20px;
    animation: fadeIn 2s;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 1.2em;
    cursor: pointer;
}

.si {
    background-color: #4CAF50;
    color: white;
}

.no {
    background-color: #ff4d4d;
    color: white;
    position: absolute;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<h1>Para Vianna ❤️</h1>
<p>Toca los corazones 💖</p>

<div id="gameArea"></div>
<div id="message"></div>

<div id="final">
    <h2>¿Quieres estar conmigo? 💕</h2>
    <button class="si" onclick="respuestaSi()">Sí 💖</button>
    <button class="no" id="noBtn">No 😢</button>
</div>

<audio id="musica" autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
const mensajes = [
    "Eres lo mejor que me ha pasado ❤️",
    "Tu sonrisa me encanta 😍",
    "Cada día te quiero más 💕",
    "Eres muy especial para mí 💖",
    "Contigo todo es mejor 🥰",
    "Me haces muy feliz 💫"
];

let puntos = 0;

function crearCorazon() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 90 + "%";
    heart.style.top = Math.random() * 80 + "%";

    heart.onclick = () => {
        const mensaje = mensajes[Math.floor(Math.random() * mensajes.length)];
        document.getElementById("message").innerHTML = mensaje;
        heart.remove();
        puntos++;

        if (puntos >= 7) {
            document.getElementById("final").style.display = "block";
        }
    };

    document.getElementById("gameArea").appendChild(heart);
}

for (let i = 0; i < 10; i++) {
    crearCorazon();
}

const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
    noBtn.style.left = Math.random() * 80 + "%";
    noBtn.style.top = Math.random() * 80 + "%";
});

function respuestaSi() {
    document.body.innerHTML = `
        <h1 style="margin-top:50px;">💖 Sabía que dirías que sí 💖</h1>
        <p style="font-size:1.5em;">Te quiero mucho, Vianna 😍</p>
    `;
}
</script>

</body>
</html>
