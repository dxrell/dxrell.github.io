<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Vianna ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    overflow: hidden;
}

h1 {
    margin-top: 20px;
}

#gameArea {
    position: relative;
    width: 100%;
    height: 65vh;
}

.heart {
    position: absolute;
    font-size: 40px;
    cursor: pointer;
    animation: float 3s infinite ease-in-out;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-25px); }
    100% { transform: translateY(0); }
}

#finalMessage {
    display: none;
    font-size: 26px;
    margin-top: 20px;
}

button {
    padding: 12px 20px;
    font-size: 18px;
    background: white;
    color: #ff4d6d;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Para ti, Vianna 💖</h1>
<p>Toca los corazones...</p>

<div id="gameArea"></div>

<div id="finalMessage">
    💕 ¿Quieres estar conmigo? 💕 <br><br>
    <button onclick="respuesta()">Sí 💘</button>
</div>

<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
let count = 0;

function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 90 + "%";
    heart.style.top = Math.random() * 60 + "%";

    heart.onclick = () => {
        heart.remove();
        count++;

        if (count >= 5) {
            document.getElementById("finalMessage").style.display = "block";
        }
    };

    document.getElementById("gameArea").appendChild(heart);
}

setInterval(createHeart, 800);

function respuesta() {
    alert("Sabía que dirías que sí ❤️ Te amo  mucho Vianna 💕");
}
</script>

</body>
</html>
